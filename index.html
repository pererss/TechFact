<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFact – Энциклопедия техники</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... весь CSS из предыдущего ответа без изменений ... */
        :root {
            --bg-base: #050505;
            --bg-surface: #0f0f0f;
            --bg-hover: #1a1a1a;
            --border-color: #2a2a2a;
            --border-hover: #555;
            --text-main: #fff;
            --text-muted: #888;
            --accent: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 30px;
            border-bottom: 1px solid var(--border-color); background: rgba(5,5,5,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; gap: 20px;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
        .logo span { color: var(--text-muted); font-weight: 400; }
        .search-container { flex: 1; max-width: 500px; position: relative; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-bar {
            width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 10px 12px 10px 40px; font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-bar:focus { border-color: var(--border-hover); background: var(--bg-hover); }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface);
            border: 1px solid var(--border-color); border-top: none; max-height: 300px; overflow-y: auto; display: none; z-index: 200;
        }
        .search-dropdown.active { display: block; }
        .search-item {
            padding: 10px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; font-size: 14px; transition: background 0.1s;
        }
        .search-item:hover { background: var(--bg-hover); }
        .header-buttons { display: flex; align-items: center; gap: 15px; }
        .header-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px;
            font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: 0.2s; white-space: nowrap; text-transform: uppercase;
        }
        .header-btn i { font-size: 16px; }
        .header-btn:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }
        .profile-icon {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 18px;
        }
        .profile-icon:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }
        #app { min-height: calc(100vh - 60px); }

        .home-container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .section-title {
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ""; width: 8px; height: 8px; background: var(--text-muted); }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .bento-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 25px; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden; min-height: 160px;
        }
        .bento-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .bento-card::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none; opacity: 0.5;
        }
        .card-icon { font-size: 28px; color: var(--text-muted); margin-bottom: 15px; }
        .card-info { z-index: 1; }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
        .card-desc { font-size: 13px; color: var(--text-muted); }

        .category-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .model-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 20px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .model-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .model-card i { font-size: 20px; color: var(--text-muted); }
        .model-title { font-size: 16px; font-weight: 600; }

        .detail-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .left-panel {
            width: 280px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px;
        }
        .right-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: var(--bg-base);
        }
        .tree-node {
            padding: 8px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-muted);
            transition: 0.1s;
        }
        .tree-node:hover { color: var(--text-main); background: var(--bg-hover); }
        .tree-node.active { color: var(--text-main); font-weight: 600; background: var(--bg-hover); }
        .tree-node.parent { font-weight: 600; color: var(--text-main); margin-top: 10px; }
        .content-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .content-body { font-size: 15px; line-height: 1.7; color: #ddd; }
        .bookmark-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 12px;
            cursor: pointer; transition: 0.2s; margin-left: 15px; font-size: 14px; white-space: nowrap;
        }
        .bookmark-btn:hover { border-color: var(--border-hover); color: var(--text-main); }

        .whatinside-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .whatinside-btn:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }

        .part-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .part-card h4 {
            font-size: 16px;
            margin-bottom: 5px;
            cursor: pointer;
            color: var(--accent);
            text-decoration: underline;
        }
        .part-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .learning-container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .learning-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .learning-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 25px; cursor: pointer; transition: 0.2s;
        }
        .learning-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .learning-card h4 { font-size: 18px; margin-bottom: 8px; }
        .learning-card p { font-size: 13px; color: var(--text-muted); }

        .part-detail-container { padding: 30px; max-width: 900px; margin: 0 auto; }
        .fact-box {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 15px 20px; margin-top: 15px;
            font-size: 14px; line-height: 1.6;
        }

        .sidebar {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: var(--bg-base);
            border-left: 1px solid var(--border-color); transition: right 0.3s; z-index: 200; display: flex; flex-direction: column;
        }
        .sidebar.open { right: 0; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .close-btn:hover { color: var(--text-main); }
        .sidebar-content { padding: 25px; overflow-y: auto; }
        .log-item { padding: 12px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .log-item:hover { color: var(--text-main); }
        .log-item-title { font-weight: 600; }
        .log-item-desc { color: var(--text-muted); font-size: 12px; }
        .remove-bookmark { background: none; border: none; color: var(--text-muted); cursor: pointer; float: right; font-size: 14px; }
        .remove-bookmark:hover { color: #ff5555; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 150;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        @media (max-width: 768px) {
            .search-container { display: none; }
            .header-buttons .header-btn { padding: 6px 12px; font-size: 12px; }
            .detail-container { flex-direction: column; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); max-height: 40vh; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="location.hash='home'">Tech<span>Fact</span></div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-bar" id="searchInput" placeholder="Поиск по каталогу..." autocomplete="off">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <div class="header-buttons">
            <button class="header-btn" onclick="location.hash='learning'"><i class="fa-solid fa-graduation-cap"></i> Учебный центр</button>
            <button class="header-btn" onclick="App.toggleSidebar()"><i class="fa-solid fa-book"></i> Журнал</button>
            <button class="profile-icon" title="Профиль (в разработке)"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>
    <div id="app"></div>
    <div class="overlay" id="overlay" onclick="App.toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-weight:600;text-transform:uppercase;letter-spacing:1px;">Бортовой журнал</div>
            <button class="close-btn" onclick="App.toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>
    <script>
        const App = (() => {
            let catalog = null;
            let apiThrottle = false;

            async function loadCatalog() {
                try {
                    const resp = await fetch('data.json');
                    if (!resp.ok) throw new Error('data.json not found');
                    catalog = await resp.json();
                } catch (e) {
                    console.error(e);
                    catalog = { categories: [] };
                }
                handleRoute();
            }

            const extendedPartsInfo = {
                engine: { facts: ["Первый коммерчески успешный ДВС был создан Жаном Этьеном Ленуаром в 1859 году.", "КПД бензинового двигателя — около 25–30%, дизеля — до 45%.", "Двигатель Ferrari V12 имеет угол развала 65° и развивает более 800 л.с."] },
                turbo: { facts: ["Патент на турбокомпрессор получил Альфред Бюхи в 1905 году.", "Температура выхлопных газов на входе в турбину может достигать 1050°C.", "Ротор турбокомпрессора может вращаться со скоростью до 300 000 об/мин."] },
                transmission: { facts: ["Первая автоматическая КПП Hydra-Matic появилась в 1939 году.", "DSG переключает передачу за 0,2 секунды.", "Вариатор запатентован Леонардо да Винчи в 1490 году."] },
                suspension: { facts: ["Независимая подвеска впервые применена на Lancia Lambda в 1922 году.", "Пневмоподвеска выравнивает уровень кузова.", "Адаптивная подвеска меняет жёсткость за 10 мс."] },
                fuel_injector: { facts: ["Давление впрыска в бензиновых системах до 350 бар, в дизельных — до 2700 бар.", "Пьезофорсунки обеспечивают до 5 впрысков за цикл.", "Технология GDI впервые появилась на Mitsubishi Galant в 1996 году."] }
            };

            function getPartFacts(partId) {
                if (extendedPartsInfo[partId]) return extendedPartsInfo[partId].facts;
                const part = catalog?.categories?.find(c => c.id === 'parts')?.items?.find(i => i.id === partId);
                return part ? [part.desc || 'Описание временно недоступно.'] : ['Информация о данной детали появится позже.'];
            }

            const BOOKMARK_KEY = 'techfact_bookmarks';
            const HISTORY_KEY = 'techfact_history';
            const MAX_HISTORY = 10;
            function getBookmarks() { try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || []; } catch { return []; } }
            function saveBookmarks(b) { localStorage.setItem(BOOKMARK_KEY, JSON.stringify(b)); }
            function toggleBookmark(item) {
                const bm = getBookmarks(); const idx = bm.findIndex(x => x.url === item.url);
                if (idx >= 0) bm.splice(idx, 1); else bm.unshift(item);
                saveBookmarks(bm); renderSidebar(); return idx < 0;
            }
            function isBookmarked(url) { return getBookmarks().some(x => x.url === url); }
            function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } }
            function addHistory(item) {
                const h = getHistory().filter(x => x.url !== item.url); h.unshift(item);
                if (h.length > MAX_HISTORY) h.pop(); localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); renderSidebar();
            }

            // Защита от 429 и задержка между запросами
            async function wikiFetch(url) {
                if (apiThrottle) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    apiThrottle = false;
                }
                const resp = await fetch(url);
                if (resp.status === 429) {
                    apiThrottle = true;
                    throw new Error('Слишком много запросов к Википедии. Подождите немного и попробуйте снова.');
                }
                if (!resp.ok) throw new Error(`Ошибка ${resp.status}`);
                return await resp.json();
            }

            const WIKI_API = 'https://ru.wikipedia.org/api/rest_v1';
            async function wikiSummaryText(title) {
                try {
                    const data = await wikiFetch(`${WIKI_API}/page/summary/${encodeURIComponent(title)}`);
                    return stripWikiMarkup(data.extract_html || data.extract) || 'Нет описания.';
                } catch (e) {
                    return e.message.includes('429') ? 'Слишком много запросов к Википедии. Попробуйте позже.' : 'Не удалось загрузить описание.';
                }
            }
            async function wikiSections(title) {
                try {
                    const data = await wikiFetch(`https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=sections&format=json&origin=*`);
                    return (data.parse?.sections || []).map(s => ({ index: s.index, line: s.line }));
                } catch (e) {
                    return [];
                }
            }
            async function wikiSectionContent(title, idx) {
                try {
                    const data = await wikiFetch(`https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&section=${idx}&prop=text&format=json&origin=*`);
                    return stripWikiMarkup(data.parse?.text?.['*']) || 'Нет содержимого';
                } catch (e) {
                    return 'Не удалось загрузить раздел.';
                }
            }

            function stripWikiMarkup(html) {
                if (!html) return '';
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                tmp.querySelectorAll('style, script, .mw-editsection, .reference, sup, .noprint').forEach(el => el.remove());
                tmp.querySelectorAll('a').forEach(a => a.replaceWith(a.textContent));
                let text = tmp.textContent || '';
                text = text.replace(/\[править\s*\|\s*править\s*код\]/gi, '');
                text = text.replace(/\s+/g, ' ').trim();
                return text;
            }

            function searchCatalog(query) {
                const results = []; const q = query.toLowerCase();
                catalog.categories.forEach(cat => cat.items.forEach(item => {
                    if (item.title.toLowerCase().includes(q)) results.push({ title: item.title, category: cat.title, url: `#item/${cat.id}/${item.id}` });
                }));
                return results.slice(0, 10);
            }

            const app = document.getElementById('app');

            function renderHome() {
                if (!catalog?.categories?.length) { app.innerHTML = '<div class="home-container"><p>Загрузка каталога...</p></div>'; return; }
                app.innerHTML = `<div class="home-container"><div class="section-title">Каталог техники</div><div class="bento-grid" id="bentoGrid"></div></div>`;
                const grid = document.getElementById('bentoGrid');
                catalog.categories.forEach(cat => {
                    const card = document.createElement('div'); card.className = 'bento-card';
                    card.innerHTML = `<div class="card-icon"><i class="fa-solid ${cat.icon}"></i></div><div class="card-info"><div class="card-title">${cat.title}</div><div class="card-desc">${cat.items.length} моделей</div></div>`;
                    card.addEventListener('click', () => location.hash = `category/${cat.id}`); grid.appendChild(card);
                });
            }

            function renderLearningCenter() {
                const partsCat = catalog?.categories?.find(c => c.id === 'parts');
                if (!partsCat) { app.innerHTML = '<div class="learning-container"><p>Раздел деталей временно недоступен.</p></div>'; return; }
                app.innerHTML = `<div class="learning-container"><h1 class="detail-title">Учебный центр: автомобильные детали и узлы</h1><div class="learning-grid" id="learningGrid"></div></div>`;
                const grid = document.getElementById('learningGrid');
                partsCat.items.forEach(item => {
                    const card = document.createElement('div'); card.className = 'learning-card';
                    card.innerHTML = `<h4>${item.title}</h4><p>${item.desc || ''}</p>`;
                    card.addEventListener('click', () => location.hash = `part/${item.id}`); grid.appendChild(card);
                });
            }

            function renderPartDetail(partId) {
                const partsCat = catalog?.categories?.find(c => c.id === 'parts'); const part = partsCat?.items?.find(i => i.id === partId);
                if (!part) { location.hash = 'learning'; return; }
                const facts = getPartFacts(partId);
                app.innerHTML = `
                    <div class="part-detail-container">
                        <div class="detail-header"><h1 class="detail-title">${part.title}</h1><button class="bookmark-btn" id="bookmarkBtn"><i class="fa-solid fa-bookmark"></i> ${isBookmarked(`#part/${partId}`) ? 'В журнале' : 'Добавить'}</button></div>
                        <div class="detail-content"><p>${part.desc || ''}</p><h3 style="margin-top:20px;">Технические факты:</h3>${facts.map(f => `<div class="fact-box">${f}</div>`).join('')}</div>
                    </div>`;
                document.getElementById('bookmarkBtn').addEventListener('click', function() { const added = toggleBookmark({ title: part.title, url: `#part/${partId}` }); this.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${added ? 'В журнале' : 'Добавить'}`; });
                addHistory({ title: part.title, url: `#part/${partId}` });
            }

            function renderCategory(catId) {
                const cat = catalog.categories.find(c => c.id === catId);
                if (!cat) { location.hash = 'home'; return; }
                app.innerHTML = `<div style="padding:30px;max-width:1400px;margin:0 auto;"><h1 class="detail-title">${cat.title}</h1><div class="category-list" id="categoryList"></div></div>`;
                const list = document.getElementById('categoryList');
                if (!cat.items.length) { list.innerHTML = '<p>В этой категории пока нет моделей.</p>'; return; }
                cat.items.forEach(item => {
                    const card = document.createElement('div'); card.className = 'model-card';
                    card.innerHTML = `<i class="fa-solid ${cat.icon}"></i><span class="model-title">${item.title}</span>`;
                    card.addEventListener('click', () => location.hash = `item/${cat.id}/${item.id}`); list.appendChild(card);
                });
            }

            async function renderItem(catId, itemId) {
                const cat = catalog.categories.find(c => c.id === catId);
                const item = cat?.items?.find(i => i.id === itemId);
                if (!item) { location.hash = 'home'; return; }

                app.innerHTML = `
                    <div class="detail-container">
                        <div class="left-panel" id="leftPanel">
                            <div style="margin-bottom:20px;font-weight:600;">${item.title}</div>
                            <div id="treeContainer"></div>
                        </div>
                        <div class="right-panel">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <h1 class="content-title" id="contentTitle">${item.title}</h1>
                                <button class="bookmark-btn" id="bookmarkBtn">
                                    <i class="fa-solid fa-bookmark"></i> ${isBookmarked(`#item/${catId}/${itemId}`) ? 'В журнале' : 'Добавить'}
                                </button>
                            </div>
                            <div class="content-body" id="contentBody">Загрузка...</div>
                            <button class="whatinside-btn" id="whatInsideBtn"><i class="fa-solid fa-microchip"></i> Что внутри</button>
                            <div id="partsContainer" style="display:none; margin-top:20px;"></div>
                        </div>
                    </div>
                `;

                const treeContainer = document.getElementById('treeContainer');
                const contentBody = document.getElementById('contentBody');
                const bookmarkBtn = document.getElementById('bookmarkBtn');
                const whatInsideBtn = document.getElementById('whatInsideBtn');
                const partsContainer = document.getElementById('partsContainer');

                bookmarkBtn.addEventListener('click', () => {
                    const added = toggleBookmark({ title: item.title, url: `#item/${catId}/${itemId}` });
                    bookmarkBtn.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${added ? 'В журнале' : 'Добавить'}`;
                });

                const partsCat = catalog.categories.find(c => c.id === 'parts');
                const relatedPartIds = item.related_parts || [];
                if (relatedPartIds.length && partsCat) {
                    whatInsideBtn.addEventListener('click', async () => {
                        if (partsContainer.style.display === 'none') {
                            partsContainer.style.display = 'block';
                            partsContainer.innerHTML = '<p style="color:var(--text-muted);">Загрузка описаний деталей...</p>';
                            const partDetails = [];
                            for (const pid of relatedPartIds) {
                                const part = partsCat.items.find(p => p.id === pid);
                                if (part) {
                                    const summary = await wikiSummaryText(part.title);
                                    const shortSummary = summary.split('. ').slice(0, 2).join('. ') + (summary.split('. ').length > 2 ? '.' : '');
                                    partDetails.push({ ...part, shortSummary });
                                }
                            }
                            partsContainer.innerHTML = partDetails.length ? partDetails.map(p => `
                                <div class="part-card">
                                    <h4 onclick="location.hash='part/${p.id}'">${p.title}</h4>
                                    <p>${p.shortSummary || 'Описание загружается...'}</p>
                                </div>
                            `).join('') : '<p>Нет связанных деталей.</p>';
                        } else {
                            partsContainer.style.display = 'none';
                        }
                    });
                } else {
                    whatInsideBtn.style.display = 'none';
                }

                try {
                    const summaryText = await wikiSummaryText(item.title);
                    contentBody.innerHTML = `<p>${summaryText}</p>`;
                    addHistory({ title: item.title, url: `#item/${catId}/${itemId}` });

                    const sections = await wikiSections(item.title);
                    treeContainer.innerHTML = '';
                    const overviewNode = document.createElement('div');
                    overviewNode.className = 'tree-node parent active';
                    overviewNode.textContent = 'Обзор';
                    overviewNode.addEventListener('click', () => {
                        contentBody.innerHTML = `<p>${summaryText}</p>`;
                        setActive(overviewNode);
                    });
                    treeContainer.appendChild(overviewNode);

                    sections.forEach(s => {
                        const node = document.createElement('div');
                        node.className = 'tree-node';
                        node.textContent = s.line;
                        node.addEventListener('click', async () => {
                            setActive(node);
                            contentBody.innerHTML = '<p>Загрузка...</p>';
                            try {
                                const html = await wikiSectionContent(item.title, s.index);
                                contentBody.innerHTML = html;
                            } catch {
                                contentBody.innerHTML = '<p>Не удалось загрузить раздел.</p>';
                            }
                            addHistory({ title: s.line, url: `#item/${catId}/${itemId}` });
                        });
                        treeContainer.appendChild(node);
                    });
                } catch (e) {
                    contentBody.innerHTML = '<p>Не удалось загрузить статью. Возможно, превышен лимит запросов. Попробуйте позже.</p>';
                }

                function setActive(node) {
                    treeContainer.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
                    if (node) node.classList.add('active');
                }
            }

            function handleRoute() {
                const hash = location.hash.substring(1) || 'home';
                if (hash === 'home') renderHome();
                else if (hash === 'learning') renderLearningCenter();
                else if (hash.startsWith('part/')) renderPartDetail(hash.split('/')[1]);
                else if (hash.startsWith('category/')) renderCategory(hash.split('/')[1]);
                else if (hash.startsWith('item/')) {
                    const parts = hash.split('/');
                    if (parts.length >= 3) renderItem(parts[1], parts[2]);
                    else renderHome();
                }
                else if (hash.startsWith('wiki/')) {
                    app.innerHTML = '<div class="detail-container"><h1>Статья из Википедии</h1></div>';
                }
                else renderHome();
            }

            function renderSidebar() {
                const sc = document.getElementById('sidebarContent'); if (!sc) return;
                const bm = getBookmarks(); const hist = getHistory();
                sc.innerHTML = `
                    <div class="section-title" style="margin-top:0;">Закладки</div>
                    ${bm.length === 0 ? '<p style="color:var(--text-muted);">Нет закладок</p>' : ''}
                    ${bm.map(b => `<div class="log-item" onclick="location.hash='${b.url.substring(1)}'"><div class="log-item-title">${b.title}</div><button class="remove-bookmark" onclick="event.stopPropagation();App.removeBookmark('${b.url}')"><i class="fa-solid fa-trash"></i></button></div>`).join('')}
                    <div class="section-title" style="margin-top:30px;">История</div>
                    ${hist.length === 0 ? '<p style="color:var(--text-muted);">Нет записей</p>' : ''}
                    ${hist.map(h => `<div class="log-item" onclick="location.hash='${h.url.substring(1)}'"><div class="log-item-title">${h.title}</div><div class="log-item-desc">${catalog?.categories?.find(c => c.id === h.url.split('/')[1])?.title || 'Техника'}</div></div>`).join('')}
                `;
            }

            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('overlay').classList.toggle('active');
                renderSidebar();
            }
            function removeBookmark(url) { saveBookmarks(getBookmarks().filter(b => b.url !== url)); renderSidebar(); }

            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                if (q.length < 2) { searchDropdown.innerHTML = ''; searchDropdown.classList.remove('active'); return; }
                const results = searchCatalog(q);
                searchDropdown.innerHTML = results.length ? results.map(r => `<div class="search-item" data-url="${r.url}"><strong>${r.title}</strong><div style="font-size:12px;color:var(--text-muted)">${r.category}</div></div>`).join('') : '<div class="search-item">Ничего не найдено в каталоге</div>';
                searchDropdown.classList.add('active');
                document.querySelectorAll('#searchDropdown .search-item').forEach(el => {
                    el.addEventListener('click', () => { if (el.dataset.url) location.hash = el.dataset.url.substring(1); searchDropdown.classList.remove('active'); searchInput.value = ''; });
                });
            });
            document.addEventListener('click', e => { if (!e.target.closest('.search-container')) searchDropdown.classList.remove('active'); });

            window.addEventListener('hashchange', handleRoute);
            loadCatalog().then(() => { renderSidebar(); });
            return { toggleSidebar, removeBookmark };
        })();
    </script>
</body>
</html>
