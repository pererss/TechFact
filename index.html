<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFact – Техническая энциклопедия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #0f0f0f;
            --bg-hover: #1a1a1a;
            --border-color: #2a2a2a;
            --border-hover: #555;
            --text-main: #fff;
            --text-muted: #888;
            --accent: #fff;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: var(--bg-base);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .logo span { color: var(--text-muted); font-weight: 400; }
        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 40px;
            position: relative;
        }
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-bar {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px 12px 45px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-bar:focus {
            border-color: var(--border-hover);
            background: var(--bg-hover);
        }
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-top: none;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }
        .search-dropdown.active { display: block; }
        .search-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 14px;
            transition: background 0.1s;
        }
        .search-item:hover { background: var(--bg-hover); }
        .search-item .source { color: var(--text-muted); font-size: 12px; }
        .logbook-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .logbook-btn:hover { border-color: var(--border-hover); background: var(--bg-surface); }
        #app { min-height: calc(100vh - 73px); }
        .home-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: "";
            width: 8px; height: 8px;
            background: var(--text-muted);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            grid-auto-rows: 250px;
        }
        .bento-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .bento-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }
        .bento-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            opacity: 0.5;
        }
        .card-icon { font-size: 32px; color: var(--text-muted); margin-bottom: 20px; }
        .card-info { z-index: 1; }
        .card-title { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .card-desc { font-size: 13px; color: var(--text-muted); }
        .card-large { grid-column: span 8; }
        .card-medium { grid-column: span 4; }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .model-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            padding: 25px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .model-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .model-card i { font-size: 24px; color: var(--text-muted); }
        .model-title { font-size: 18px; font-weight: 600; }
        .detail-container {
            display: flex;
            height: calc(100vh - 73px);
        }
        .left-panel {
            width: 280px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px;
        }
        .right-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: var(--bg-base);
        }
        .tree-node {
            padding: 8px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-muted);
            transition: 0.1s;
        }
        .tree-node:hover { color: var(--text-main); background: var(--bg-hover); }
        .tree-node.active { color: var(--text-main); font-weight: 600; background: var(--bg-hover); }
        .tree-node.parent { font-weight: 600; color: var(--text-main); margin-top: 10px; }
        .content-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .content-body { font-size: 15px; line-height: 1.7; color: #ddd; }
        .content-body a { color: var(--accent); text-decoration: underline; }
        .bookmark-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 10px;
            font-size: 14px;
        }
        .bookmark-btn:hover { border-color: var(--border-hover); color: var(--text-main); }
        .sidebar {
            position: fixed;
            top: 0; right: -400px;
            width: 350px;
            height: 100vh;
            background: var(--bg-base);
            border-left: 1px solid var(--border-color);
            transition: right 0.3s;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { right: 0; }
        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .close-btn:hover { color: var(--text-main); }
        .sidebar-content { padding: 25px; overflow-y: auto; }
        .log-item { padding: 15px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .log-item:hover { color: var(--text-main); }
        .log-item-title { font-weight: 600; }
        .log-item-desc { color: var(--text-muted); font-size: 12px; }
        .remove-bookmark {
            background: none; border: none; color: var(--text-muted); cursor: pointer; float: right; font-size: 14px;
        }
        .remove-bookmark:hover { color: #ff5555; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            opacity: 0; pointer-events: none;
            transition: 0.3s;
            z-index: 150;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        @media (max-width: 900px) {
            .bento-card { grid-column: span 12 !important; }
            .search-container { display: none; }
            .detail-container { flex-direction: column; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); max-height: 40vh; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="location.hash='home'">Tech<span>Fact</span></div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-bar" id="searchInput" placeholder="Поиск модели, детали..." autocomplete="off">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <button class="logbook-btn" onclick="App.toggleSidebar()">
            <i class="fa-solid fa-book"></i> Журнал
        </button>
    </header>
    <div id="app"></div>
    <div class="overlay" id="overlay" onclick="App.toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-weight:600;text-transform:uppercase;letter-spacing:1px;">Бортовой журнал</div>
            <button class="close-btn" onclick="App.toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>
    <script>
        const App = (() => {
            let catalog = null;
            async function loadCatalog() {
                try {
                    const resp = await fetch('data.json');
                    if (!resp.ok) throw new Error('data.json not found');
                    catalog = await resp.json();
                } catch (e) { catalog = { categories: [] }; }
                handleRoute();
            }
            const BOOKMARK_KEY = 'techfact_bookmarks';
            const HISTORY_KEY = 'techfact_history';
            const MAX_HISTORY = 10;
            function getBookmarks() { try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || []; } catch { return []; } }
            function saveBookmarks(b) { localStorage.setItem(BOOKMARK_KEY, JSON.stringify(b)); }
            function toggleBookmark(item) {
                const bm = getBookmarks();
                const idx = bm.findIndex(x => x.url === item.url);
                if (idx >= 0) bm.splice(idx, 1); else bm.unshift(item);
                saveBookmarks(bm);
                renderSidebar();
                return idx < 0;
            }
            function isBookmarked(url) { return getBookmarks().some(x => x.url === url); }
            function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } }
            function addHistory(item) {
                const h = getHistory().filter(x => x.url !== item.url);
                h.unshift(item);
                if (h.length > MAX_HISTORY) h.pop();
                localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
                renderSidebar();
            }
            const WIKI_API = 'https://ru.wikipedia.org/api/rest_v1';
            async function wikiSearch(query, limit = 10) {
                const url = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=${limit}`;
                const resp = await fetch(url);
                const data = await resp.json();
                return (data.query?.search || []).map(r => ({
                    title: r.title,
                    snippet: r.snippet.replace(/<\/?[^>]+(>|$)/g, ""),
                    url: `#wiki/${encodeURIComponent(r.title)}`
                }));
            }
            async function wikiSummary(title) {
                const resp = await fetch(`${WIKI_API}/page/summary/${encodeURIComponent(title)}`);
                if (!resp.ok) throw new Error('not found');
                return await resp.json();
            }
            async function wikiSections(title) {
                const url = `https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=sections&format=json&origin=*`;
                const resp = await fetch(url);
                const data = await resp.json();
                return (data.parse?.sections || []).map(s => ({ index: s.index, line: s.line }));
            }
            async function wikiSectionContent(title, idx) {
                const url = `https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&section=${idx}&prop=text&format=json&origin=*`;
                const resp = await fetch(url);
                const data = await resp.json();
                return data.parse?.text?.['*'] || '<p>Нет содержимого</p>';
            }
            const app = document.getElementById('app');
            function renderHome() {
                if (!catalog?.categories.length) { app.innerHTML = '<div class="home-container"><p>Загрузка каталога...</p></div>'; return; }
                app.innerHTML = `<div class="home-container"><div class="section-title">Каталог техники</div><div class="bento-grid" id="bentoGrid"></div></div>`;
                const grid = document.getElementById('bentoGrid');
                const sizes = ['card-large','card-medium','card-medium','card-medium','card-medium','card-medium','card-medium'];
                catalog.categories.forEach((cat,i) => {
                    const card = document.createElement('div');
                    card.className = `bento-card ${sizes[i] || 'card-medium'}`;
                    card.innerHTML = `<div class="card-icon"><i class="fa-solid ${cat.icon}"></i></div><div class="card-info"><div class="card-title">${cat.title}</div><div class="card-desc">${cat.desc}</div></div>`;
                    card.addEventListener('click', () => location.hash = `category/${cat.id}`);
                    grid.appendChild(card);
                });
            }
            function renderCategory(catId) {
                const cat = catalog.categories.find(c => c.id === catId);
                if (!cat) { location.hash = 'home'; return; }
                app.innerHTML = `<div style="padding:40px;max-width:1400px;margin:0 auto;"><h1 class="content-title">${cat.title}</h1><div class="category-grid" id="categoryGrid"></div></div>`;
                const grid = document.getElementById('categoryGrid');
                if (!cat.items.length) { grid.innerHTML = '<p>Нет моделей</p>'; return; }
                cat.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'model-card';
                    card.innerHTML = `<i class="fa-solid ${cat.icon}"></i><span class="model-title">${item.title}</span>`;
                    card.addEventListener('click', () => location.hash = `item/${cat.id}/${item.id}`);
                    grid.appendChild(card);
                });
            }
            function renderWiki(title) {
                app.innerHTML = `<div class="detail-container"><div class="left-panel" id="leftPanel"><div style="margin-bottom:20px;font-weight:600;">${title}</div><div id="treeContainer"></div></div><div class="right-panel"><div style="display:flex;align-items:center;justify-content:space-between;"><h1 class="content-title" id="contentTitle">${title}</h1><button class="bookmark-btn" id="bookmarkBtn"><i class="fa-solid fa-bookmark"></i> ${isBookmarked(`#wiki/${encodeURIComponent(title)}`) ? 'В журнале' : 'Добавить'}</button></div><div class="content-body" id="contentBody">Загрузка...</div></div></div>`;
                const tree = document.getElementById('treeContainer');
                const body = document.getElementById('contentBody');
                const btn = document.getElementById('bookmarkBtn');
                btn.addEventListener('click', () => {
                    const added = toggleBookmark({ title, url: `#wiki/${encodeURIComponent(title)}` });
                    btn.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${added ? 'В журнале' : 'Добавить'}`;
                });
                function setActive(n) { tree.querySelectorAll('.tree-node').forEach(e => e.classList.remove('active')); if (n) n.classList.add('active'); }
                (async () => {
                    try {
                        const sum = await wikiSummary(title);
                        body.innerHTML = sum.extract_html || `<p>${sum.extract}</p>`;
                        addHistory({ title, url: `#wiki/${encodeURIComponent(title)}` });
                        const secs = await wikiSections(title);
                        tree.innerHTML = '';
                        const ov = document.createElement('div'); ov.className = 'tree-node parent active'; ov.textContent = 'Обзор';
                        ov.addEventListener('click', () => { body.innerHTML = sum.extract_html || `<p>${sum.extract}</p>`; setActive(ov); });
                        tree.appendChild(ov);
                        secs.forEach(s => {
                            const el = document.createElement('div'); el.className = 'tree-node'; el.textContent = s.line;
                            el.addEventListener('click', async () => {
                                setActive(el); body.innerHTML = '<p>Загрузка...</p>';
                                try { body.innerHTML = await wikiSectionContent(title, s.index); } catch { body.innerHTML = '<p>Ошибка</p>'; }
                                addHistory({ title: s.line, url: `#wiki/${encodeURIComponent(title)}` });
                            });
                            tree.appendChild(el);
                        });
                    } catch { body.innerHTML = '<p>Статья не найдена</p>'; }
                })();
            }
            function handleRoute() {
                const hash = location.hash.substring(1) || 'home';
                if (hash === 'home') renderHome();
                else if (hash.startsWith('category/')) renderCategory(hash.split('/')[1]);
                else if (hash.startsWith('item/')) {
                    const parts = hash.split('/');
                    const catId = parts[1];
                    const itemId = parts[2];
                    const item = catalog?.categories?.find(c=>c.id===catId)?.items?.find(i=>i.id===itemId);
                    if (item) renderWiki(item.title);
                    else renderHome();
                }
                else if (hash.startsWith('wiki/')) {
                    const title = decodeURIComponent(hash.substring(5));
                    renderWiki(title);
                }
                else renderHome();
            }
            function renderSidebar() {
                const sc = document.getElementById('sidebarContent');
                const bm = getBookmarks();
                const hist = getHistory();
                sc.innerHTML = `
                    <div class="section-title" style="margin-top:0;">Закладки</div>
                    ${bm.length===0?'<p style="color:var(--text-muted);">Нет закладок</p>':''}
                    ${bm.map(b=>`<div class="log-item" onclick="location.hash='${b.url.substring(1)}'"><div class="log-item-title">${b.title}</div><button class="remove-bookmark" onclick="event.stopPropagation(); App.removeBookmark('${b.url}')"><i class="fa-solid fa-trash"></i></button></div>`).join('')}
                    <div class="section-title" style="margin-top:30px;">История</div>
                    ${hist.length===0?'<p style="color:var(--text-muted);">Нет записей</p>':''}
                    ${hist.map(h=>`<div class="log-item" onclick="location.hash='${h.url.substring(1)}'"><div class="log-item-title">${h.title}</div><div class="log-item-desc">${h.url}</div></div>`).join('')}
                `;
            }
            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('overlay').classList.toggle('active');
                renderSidebar();
            }
            function removeBookmark(url) {
                saveBookmarks(getBookmarks().filter(b=>b.url!==url));
                renderSidebar();
            }
            let searchTimeout;
            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                const q = searchInput.value.trim();
                if (q.length < 2) { searchDropdown.innerHTML = ''; searchDropdown.classList.remove('active'); return; }
                searchTimeout = setTimeout(async () => {
                    let results = [];
                    if (catalog) {
                        catalog.categories.forEach(c => {
                            c.items?.forEach(item => {
                                if (item.title.toLowerCase().includes(q.toLowerCase())) {
                                    results.push({ title: item.title, snippet: c.title, url: `#item/${c.id}/${item.id}`, source: 'catalog' });
                                }
                            });
                        });
                    }
                    if (results.length < 5) {
                        try {
                            const wikiRes = await wikiSearch(q, 5);
                            results = [...results, ...wikiRes.map(r => ({...r, source:'wiki'}))].slice(0,8);
                        } catch {}
                    }
                    searchDropdown.innerHTML = results.map(r => `
                        <div class="search-item" data-url="${r.url}">
                            <strong>${r.title}</strong>
                            <div class="source">${r.source==='catalog'?'Каталог':'Википедия'}</div>
                            <div style="font-size:12px;color:var(--text-muted)">${r.snippet||''}</div>
                        </div>
                    `).join('');
                    searchDropdown.classList.add('active');
                    document.querySelectorAll('#searchDropdown .search-item').forEach(el => {
                        el.addEventListener('click', () => {
                            location.hash = el.dataset.url.substring(1);
                            searchDropdown.classList.remove('active');
                            searchInput.value = '';
                        });
                    });
                }, 300);
            });
            document.addEventListener('click', e => { if (!e.target.closest('.search-container')) searchDropdown.classList.remove('active'); });
            window.addEventListener('hashchange', handleRoute);
            loadCatalog().then(() => { renderSidebar(); });
            return { toggleSidebar, removeBookmark };
        })();
    </script>
</body>
</html>
