<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechFact – Техническая энциклопедия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #0f0f0f;
            --bg-hover: #1a1a1a;
            --border-color: #2a2a2a;
            --border-hover: #555;
            --text-main: #fff;
            --text-muted: #888;
            --accent: #fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        header {
            display: flex; align-items: center; justify-content: space-between; padding: 12px 20px;
            border-bottom: 1px solid var(--border-color); background: rgba(5,5,5,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; gap: 15px;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
        .logo span { color: var(--text-muted); font-weight: 400; }
        .search-container { flex: 1; max-width: 500px; position: relative; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-bar {
            width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 10px 12px 10px 40px; font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-bar:focus { border-color: var(--border-hover); background: var(--bg-hover); }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface);
            border: 1px solid var(--border-color); border-top: none; max-height: 300px; overflow-y: auto; display: none; z-index: 200;
        }
        .search-dropdown.active { display: block; }
        .search-item {
            padding: 10px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; font-size: 14px; transition: background 0.1s;
        }
        .search-item:hover { background: var(--bg-hover); }
        .header-buttons { display: flex; align-items: center; gap: 10px; }
        .header-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 12px;
            font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: 0.2s; white-space: nowrap; text-transform: uppercase;
        }
        .header-btn i { font-size: 14px; }
        .header-btn:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }
        .profile-icon {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); width: 34px; height: 34px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .profile-icon:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }
        .burger-icon { display: none; background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            .search-container { display: none; }
            .header-buttons .header-btn span { display: none; }
            .header-btn { padding: 8px; }
            .burger-icon { display: block; }
        }
        #app { min-height: calc(100vh - 60px); }

        .home-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .section-title {
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ""; width: 8px; height: 8px; background: var(--text-muted); }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .bento-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 20px; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden; min-height: 140px;
        }
        .bento-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .bento-card::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none; opacity: 0.5;
        }
        .card-icon { font-size: 24px; color: var(--text-muted); margin-bottom: 10px; }
        .card-info { z-index: 1; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .card-desc { font-size: 12px; color: var(--text-muted); }

        .category-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .model-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .model-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .model-card i { font-size: 18px; color: var(--text-muted); }
        .model-title { font-size: 15px; font-weight: 600; }

        .detail-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .left-panel {
            width: 250px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 15px;
        }
        .right-panel {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: var(--bg-base);
        }
        @media (max-width: 768px) {
            .detail-container { flex-direction: column; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); max-height: 40vh; }
        }
        .tree-node {
            padding: 8px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-muted);
            transition: 0.1s;
        }
        .tree-node:hover { color: var(--text-main); background: var(--bg-hover); }
        .tree-node.active { color: var(--text-main); font-weight: 600; background: var(--bg-hover); }
        .tree-node.parent { font-weight: 600; color: var(--text-main); margin-top: 10px; }
        .content-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .content-body { font-size: 14px; line-height: 1.6; color: #ddd; }
        .characteristics {
            margin-top: 20px;
        }
        .characteristics h3 { font-size: 16px; margin-bottom: 10px; }
        .char-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }
        .char-item span:first-child { color: var(--text-muted); }
        .char-item span:last-child { font-weight: 500; }
        .bookmark-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 5px 10px;
            cursor: pointer; transition: 0.2s; margin-left: 10px; font-size: 13px; white-space: nowrap;
        }
        .bookmark-btn:hover { border-color: var(--border-hover); color: var(--text-main); }

        .parts-section { margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .part-tag {
            display: inline-block;
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 4px 10px; font-size: 12px;
            cursor: pointer; transition: 0.2s; margin-right: 8px; margin-bottom: 8px;
        }
        .part-tag:hover { border-color: var(--border-hover); background: var(--bg-hover); }

        .learning-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .learning-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 15px; }
        .learning-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 20px; cursor: pointer; transition: 0.2s;
        }
        .learning-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .learning-card h4 { font-size: 16px; margin-bottom: 6px; }
        .learning-card p { font-size: 12px; color: var(--text-muted); }

        .part-detail-container { padding: 20px; max-width: 900px; margin: 0 auto; }
        .fact-box {
            background: var(--bg-surface); border: 1px solid var(--border-color); padding: 12px 16px; margin-top: 10px;
            font-size: 13px; line-height: 1.5;
        }

        .sidebar {
            position: fixed; top: 0; right: -380px; width: 360px; height: 100vh; background: var(--bg-base);
            border-left: 1px solid var(--border-color); transition: right 0.3s; z-index: 200; display: flex; flex-direction: column;
        }
        .sidebar.open { right: 0; }
        @media (max-width: 400px) { .sidebar { width: 100%; right: -100%; } }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }
        .close-btn:hover { color: var(--text-main); }
        .sidebar-content { padding: 20px; overflow-y: auto; flex: 1; }
        .log-item { padding: 10px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .log-item:hover { color: var(--text-main); }
        .log-item-title { font-weight: 600; }
        .log-item-desc { color: var(--text-muted); font-size: 11px; }
        .remove-bookmark { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
        .remove-bookmark:hover { color: #ff5555; }
        .compare-btn {
            margin-top: 15px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            text-align: center;
            transition: 0.2s;
        }
        .compare-btn:hover { border-color: var(--border-hover); color: var(--text-main); background: var(--bg-surface); }
        .compare-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .compare-modal.active { opacity: 1; pointer-events: all; }
        .compare-content {
            background: var(--bg-base); border: 1px solid var(--border-color); padding: 20px; max-width: 800px; width: 90%;
            max-height: 80vh; overflow-y: auto;
        }
        .compare-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .compare-table th, .compare-table td {
            border: 1px solid var(--border-color); padding: 8px 10px; font-size: 13px; text-align: left;
        }
        .compare-table th { background: var(--bg-surface); font-weight: 600; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            opacity: 0; pointer-events: none;
            transition: 0.3s;
            z-index: 150;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>
    <header>
        <button class="burger-icon" id="burgerBtn"><i class="fa-solid fa-bars"></i></button>
        <div class="logo" onclick="location.hash='home'">Tech<span>Fact</span></div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-bar" id="searchInput" placeholder="Поиск по каталогу..." autocomplete="off">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <div class="header-buttons">
            <button class="header-btn" onclick="location.hash='learning'"><i class="fa-solid fa-graduation-cap"></i> <span>Учебный центр</span></button>
            <button class="header-btn" onclick="App.toggleSidebar()"><i class="fa-solid fa-book"></i> <span>Журнал</span></button>
            <button class="profile-icon" title="Профиль (в разработке)"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>
    <div id="app"></div>
    <div class="overlay" id="overlay" onclick="App.toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-weight:600;text-transform:uppercase;letter-spacing:1px;">Бортовой журнал</div>
            <button class="close-btn" onclick="App.toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
        <div style="padding:0 20px 20px;">
            <button class="compare-btn" id="compareBtn"><i class="fa-solid fa-balance-scale"></i> Сравнить модели (2-6)</button>
        </div>
    </div>
    <div class="compare-modal" id="compareModal">
        <div class="compare-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Сравнение моделей</h3>
                <button onclick="App.closeCompare()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="compareTable"></div>
        </div>
    </div>
    <script>
        const App = (() => {
            // Твои ключи Supabase
            const SUPABASE_URL = 'https://zjqcpavkwfjspnewexwo.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_eG4OkwHesWEOzNgBP8Rs9A_G5EGzzA7';

            let catalog = null;
            const requestQueue = [];
            let isProcessingQueue = false;

            // Фиксированные списки характеристик по категориям
            const charTemplates = {
                cars: [
                    "Двигатель", "Мощность", "Крутящий момент", "Коробка передач",
                    "Привод", "Разгон 0–100 км/ч", "Максимальная скорость",
                    "Расход топлива", "Снаряжённая масса", "Объём бака"
                ],
                motorcycles: [
                    "Двигатель", "Мощность", "Крутящий момент", "Коробка передач",
                    "Привод", "Разгон 0–100 км/ч", "Максимальная скорость",
                    "Снаряжённая масса", "Объём бака", "Подвеска"
                ],
                aviation: [
                    "Длина", "Размах крыльев", "Высота", "Максимальная взлётная масса",
                    "Крейсерская скорость", "Дальность", "Двигатели", "Пассажировместимость", "Первый полёт"
                ],
                heavy: [
                    "Грузоподъёмность", "Полная масса", "Двигатель", "Мощность",
                    "Колёсная формула", "Трансмиссия", "Максимальная скорость", "Объём кузова"
                ],
                water: [
                    "Водоизмещение", "Длина", "Ширина", "Осадка",
                    "Двигатель", "Мощность", "Скорость", "Экипаж", "Год спуска"
                ],
                space: [
                    "Высота", "Диаметр", "Стартовая масса", "Полезная нагрузка",
                    "Двигатели", "Тяга", "Первый запуск", "Статус"
                ]
            };

            async function processQueue() {
                if (isProcessingQueue) return;
                isProcessingQueue = true;
                while (requestQueue.length > 0) {
                    const { url, resolve, reject } = requestQueue.shift();
                    try {
                        const result = await executeWikiFetch(url);
                        resolve(result);
                    } catch (e) { reject(e); }
                    await new Promise(r => setTimeout(r, 800));
                }
                isProcessingQueue = false;
            }

            function wikiFetch(url) {
                return new Promise((resolve, reject) => {
                    requestQueue.push({ url, resolve, reject });
                    processQueue();
                });
            }

            async function executeWikiFetch(url, retries = 2) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const resp = await fetch(url);
                        if (resp.status === 429) {
                            if (i < retries) { await new Promise(r => setTimeout(r, 1500 * (i + 1))); continue; }
                            throw new Error('429');
                        }
                        if (resp.status === 404) throw new Error('404');
                        if (!resp.ok) throw new Error(`Ошибка ${resp.status}`);
                        return await resp.json();
                    } catch (e) { if (i === retries) throw e; }
                }
            }

            async function loadCatalog() {
                try {
                    const resp = await fetch('data.json');
                    if (!resp.ok) throw new Error('data.json not found');
                    catalog = await resp.json();
                } catch (e) { console.error(e); catalog = { categories: [] }; }
                handleRoute();
            }

            // Загрузка характеристик из Supabase
            async function getCharacteristicsFromSupabase(modelTitle) {
                try {
                    const resp = await fetch(
                        `${SUPABASE_URL}/rest/v1/characteristics?model_title=eq.${encodeURIComponent(modelTitle)}`,
                        {
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${SUPABASE_KEY}`
                            }
                        }
                    );
                    if (!resp.ok) return null;
                    const data = await resp.json();
                    if (data && data.length > 0) {
                        return data[0]; // первая запись
                    }
                    return null;
                } catch (e) {
                    console.error('Ошибка загрузки из Supabase:', e);
                    return null;
                }
            }

            // Очистка текста от вики-разметки
            function stripWikiMarkup(html) {
                if (!html) return '';
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                tmp.querySelectorAll('style, script, .mw-editsection, .reference, sup, .noprint').forEach(el => el.remove());
                tmp.querySelectorAll('a').forEach(a => a.replaceWith(a.textContent));
                let text = tmp.textContent || '';
                text = text.replace(/\[править\s*\|\s*править\s*код\]/gi, '');
                text = text.replace(/\s+/g, ' ').trim();
                return text;
            }

            const WIKI_API = 'https://ru.wikipedia.org/api/rest_v1';

            async function getLongDescription(title) {
                try {
                    const sumResp = await wikiFetch(`${WIKI_API}/page/summary/${encodeURIComponent(title)}`);
                    let desc = stripWikiMarkup(sumResp.extract_html || sumResp.extract) || '';
                    if (desc.split('.').length < 3) {
                        const sections = await wikiSections(title);
                        if (sections.length > 0) {
                            const firstSectionText = await wikiSectionContent(title, sections[0].index);
                            if (firstSectionText) desc += '\n\n' + firstSectionText;
                        }
                    }
                    return desc || 'Нет описания.';
                } catch (e) { return 'Не удалось загрузить описание.'; }
            }

            async function wikiSections(title) {
                try {
                    const data = await wikiFetch(`https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=sections&format=json&origin=*`);
                    return (data.parse?.sections || []).map(s => ({ index: s.index, line: s.line }));
                } catch (e) { return []; }
            }

            async function wikiSectionContent(title, idx) {
                try {
                    const data = await wikiFetch(`https://ru.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&section=${idx}&prop=text&format=json&origin=*`);
                    return stripWikiMarkup(data.parse?.text?.['*']) || 'Нет содержимого';
                } catch (e) { return 'Не удалось загрузить раздел.'; }
            }

            function searchCatalog(query) {
                const results = []; const q = query.toLowerCase();
                catalog.categories.forEach(cat => cat.items.forEach(item => {
                    if (item.title.toLowerCase().includes(q)) results.push({ title: item.title, category: cat.title, url: `#item/${cat.id}/${item.id}` });
                }));
                return results.slice(0, 10);
            }

            const app = document.getElementById('app');

            // Закладки и история
            const BOOKMARK_KEY = 'techfact_bookmarks';
            const HISTORY_KEY = 'techfact_history';
            const MAX_HISTORY = 10;
            function getBookmarks() { try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || []; } catch { return []; } }
            function saveBookmarks(b) { localStorage.setItem(BOOKMARK_KEY, JSON.stringify(b)); }
            function toggleBookmark(item) {
                const bm = getBookmarks(); const idx = bm.findIndex(x => x.url === item.url);
                if (idx >= 0) bm.splice(idx, 1); else bm.unshift(item);
                saveBookmarks(bm); renderSidebar(); return idx < 0;
            }
            function isBookmarked(url) { return getBookmarks().some(x => x.url === url); }
            function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } }
            function addHistory(item) {
                const h = getHistory().filter(x => x.url !== item.url); h.unshift(item);
                if (h.length > MAX_HISTORY) h.pop(); localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); renderSidebar();
            }

            // Рендеринг главной
            function renderHome() {
                if (!catalog?.categories?.length) { app.innerHTML = '<div class="home-container"><p>Загрузка каталога...</p></div>'; return; }
                app.innerHTML = `<div class="home-container"><div class="section-title">Каталог техники</div><div class="bento-grid" id="bentoGrid"></div></div>`;
                const grid = document.getElementById('bentoGrid');
                catalog.categories.forEach(cat => {
                    const card = document.createElement('div'); card.className = 'bento-card';
                    card.innerHTML = `<div class="card-icon"><i class="fa-solid ${cat.icon}"></i></div><div class="card-info"><div class="card-title">${cat.title}</div><div class="card-desc">${cat.items.length} моделей</div></div>`;
                    card.addEventListener('click', () => location.hash = `category/${cat.id}`); grid.appendChild(card);
                });
            }

            // Учебный центр
            function renderLearningCenter() {
                const partsCat = catalog?.categories?.find(c => c.id === 'parts');
                if (!partsCat) { app.innerHTML = '<div class="learning-container"><p>Раздел деталей временно недоступен.</p></div>'; return; }
                app.innerHTML = `<div class="learning-container"><h1 class="detail-title">Учебный центр: детали и узлы</h1><div class="learning-grid" id="learningGrid"></div></div>`;
                const grid = document.getElementById('learningGrid');
                partsCat.items.forEach(item => {
                    const card = document.createElement('div'); card.className = 'learning-card';
                    card.innerHTML = `<h4>${item.title}</h4><p>${item.desc || ''}</p>`;
                    card.addEventListener('click', () => location.hash = `part/${item.id}`); grid.appendChild(card);
                });
            }

            function renderPartDetail(partId) {
                const partsCat = catalog?.categories?.find(c => c.id === 'parts'); const part = partsCat?.items?.find(i => i.id === partId);
                if (!part) { location.hash = 'learning'; return; }
                app.innerHTML = `
                    <div class="part-detail-container">
                        <div class="detail-header"><h1 class="detail-title">${part.title}</h1><button class="bookmark-btn" id="bookmarkBtn"><i class="fa-solid fa-bookmark"></i> ${isBookmarked(`#part/${partId}`) ? 'В журнале' : 'Добавить'}</button></div>
                        <div class="detail-content"><p>${part.desc || ''}</p></div>
                    </div>`;
                document.getElementById('bookmarkBtn').addEventListener('click', function() { const added = toggleBookmark({ title: part.title, url: `#part/${partId}` }); this.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${added ? 'В журнале' : 'Добавить'}`; });
                addHistory({ title: part.title, url: `#part/${partId}` });
            }

            function renderCategory(catId) {
                const cat = catalog.categories.find(c => c.id === catId);
                if (!cat) { location.hash = 'home'; return; }
                app.innerHTML = `<div style="padding:20px;max-width:1400px;margin:0 auto;"><h1 class="detail-title">${cat.title}</h1><div class="category-list" id="categoryList"></div></div>`;
                const list = document.getElementById('categoryList');
                if (!cat.items.length) { list.innerHTML = '<p>В этой категории пока нет моделей.</p>'; return; }
                cat.items.forEach(item => {
                    const card = document.createElement('div'); card.className = 'model-card';
                    card.innerHTML = `<i class="fa-solid ${cat.icon}"></i><span class="model-title">${item.title}</span>`;
                    card.addEventListener('click', () => location.hash = `item/${cat.id}/${item.id}`); list.appendChild(card);
                });
            }

            // Основная функция детального просмотра с характеристиками из Supabase
            async function renderItem(catId, itemId) {
                const cat = catalog.categories.find(c => c.id === catId);
                const item = cat?.items?.find(i => i.id === itemId);
                if (!item) { location.hash = 'home'; return; }

                const template = charTemplates[catId] || charTemplates.cars;

                app.innerHTML = `
                    <div class="detail-container">
                        <div class="left-panel" id="leftPanel">
                            <div style="margin-bottom:15px;font-weight:600;">${item.title}</div>
                            <div id="treeContainer">
                                <div class="tree-node parent active" data-section="overview">Обзор</div>
                                <div class="tree-node parent" data-section="market">Продажи</div>
                            </div>
                        </div>
                        <div class="right-panel">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <h1 class="content-title" id="contentTitle">${item.title}</h1>
                                <button class="bookmark-btn" id="bookmarkBtn">
                                    <i class="fa-solid fa-bookmark"></i> ${isBookmarked(`#item/${catId}/${itemId}`) ? 'В журнале' : 'Добавить'}
                                </button>
                            </div>
                            <div class="content-body" id="contentBody">Загрузка...</div>
                            <div id="partsContainer" style="margin-top:20px;"></div>
                        </div>
                    </div>
                `;

                const treeContainer = document.getElementById('treeContainer');
                const contentBody = document.getElementById('contentBody');
                const bookmarkBtn = document.getElementById('bookmarkBtn');
                const partsContainer = document.getElementById('partsContainer');

                bookmarkBtn.addEventListener('click', () => {
                    const added = toggleBookmark({ title: item.title, url: `#item/${catId}/${itemId}` });
                    bookmarkBtn.innerHTML = `<i class="fa-solid fa-bookmark"></i> ${added ? 'В журнале' : 'Добавить'}`;
                });

                // Связанные детали
                const partsCat = catalog.categories.find(c => c.id === 'parts');
                const relatedPartIds = item.related_parts || [];
                if (relatedPartIds.length && partsCat) {
                    let partsHtml = '<div class="parts-section"><div class="section-title" style="margin-top:0;">Ключевые узлы</div><div>';
                    relatedPartIds.forEach(pid => {
                        const part = partsCat.items.find(p => p.id === pid);
                        if (part) partsHtml += `<span class="part-tag" onclick="location.hash='part/${part.id}'">${part.title}</span>`;
                    });
                    partsHtml += '</div></div>';
                    partsContainer.innerHTML = partsHtml;
                }

                // Загрузка описания
                const desc = await getLongDescription(item.title);

                // Загрузка характеристик из Supabase
                let charValues = {};
                template.forEach(key => charValues[key] = 'нет данных');

                const dbRow = await getCharacteristicsFromSupabase(item.title);
                if (dbRow) {
                    // Маппим поля из таблицы на наш шаблон
                    if (dbRow.engine) charValues["Двигатель"] = dbRow.engine;
                    if (dbRow.power) charValues["Мощность"] = dbRow.power;
                    if (dbRow.torque) charValues["Крутящий момент"] = dbRow.torque;
                    if (dbRow.transmission) charValues["Коробка передач"] = dbRow.transmission;
                    if (dbRow.drive) charValues["Привод"] = dbRow.drive;
                    if (dbRow.acceleration) charValues["Разгон 0–100 км/ч"] = dbRow.acceleration;
                    if (dbRow.max_speed) charValues["Максимальная скорость"] = dbRow.max_speed;
                    if (dbRow.fuel_consumption) charValues["Расход топлива"] = dbRow.fuel_consumption;
                    if (dbRow.weight) charValues["Снаряжённая масса"] = dbRow.weight;
                    if (dbRow.fuel_tank) charValues["Объём бака"] = dbRow.fuel_tank;
                }

                // Формирование HTML характеристик
                let characteristicsHtml = '<h3>Характеристики</h3><div class="characteristics">';
                template.forEach(key => {
                    characteristicsHtml += `<div class="char-item"><span>${key}</span><span>${charValues[key] || 'нет данных'}</span></div>`;
                });
                characteristicsHtml += '</div>';

                function showOverview() {
                    contentBody.innerHTML = `${desc}<br><br>${characteristicsHtml}`;
                    addHistory({ title: item.title, url: `#item/${catId}/${itemId}` });
                }

                function showMarket() {
                    contentBody.innerHTML = `<p>Поиск объявлений о продаже ${item.title}:</p><p><a href="https://auto.ru/search/?query=${encodeURIComponent(item.title)}" target="_blank" style="color:var(--accent);">Открыть на Auto.ru</a></p><p style="color:var(--text-muted);">Скоро здесь будет встроенный поиск.</p>`;
                    addHistory({ title: 'Продажи', url: `#item/${catId}/${itemId}` });
                }

                document.querySelectorAll('.tree-node').forEach(node => {
                    node.addEventListener('click', function() {
                        document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
                        this.classList.add('active');
                        if (this.dataset.section === 'overview') showOverview();
                        else if (this.dataset.section === 'market') showMarket();
                    });
                });

                showOverview();
                addHistory({ title: item.title, url: `#item/${catId}/${itemId}` });
            }

            function handleRoute() {
                const hash = location.hash.substring(1) || 'home';
                if (hash === 'home') renderHome();
                else if (hash === 'learning') renderLearningCenter();
                else if (hash.startsWith('part/')) renderPartDetail(hash.split('/')[1]);
                else if (hash.startsWith('category/')) renderCategory(hash.split('/')[1]);
                else if (hash.startsWith('item/')) {
                    const parts = hash.split('/');
                    if (parts.length >= 3) renderItem(parts[1], parts[2]);
                    else renderHome();
                }
                else renderHome();
            }

            // Сравнение
            let compareList = [];
            function renderSidebar() {
                const sc = document.getElementById('sidebarContent'); if (!sc) return;
                const bm = getBookmarks(); const hist = getHistory();
                sc.innerHTML = `
                    <div class="section-title" style="margin-top:0;">Закладки</div>
                    ${bm.length === 0 ? '<p style="color:var(--text-muted);">Нет закладок</p>' : ''}
                    ${bm.map((b, idx) => `
                        <div class="log-item">
                            <span onclick="location.hash='${b.url.substring(1)}'">${b.title}</span>
                            <div>
                                <input type="checkbox" class="compare-check" data-id="${idx}" ${compareList.includes(idx) ? 'checked' : ''}>
                                <button class="remove-bookmark" onclick="event.stopPropagation();App.removeBookmark('${b.url}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('')}
                    <div class="section-title" style="margin-top:30px;">История</div>
                    ${hist.length === 0 ? '<p style="color:var(--text-muted);">Нет записей</p>' : ''}
                    ${hist.map(h => `<div class="log-item" onclick="location.hash='${h.url.substring(1)}'"><div class="log-item-title">${h.title}</div><div class="log-item-desc">${catalog?.categories?.find(c => c.id === h.url.split('/')[1])?.title || 'Техника'}</div></div>`).join('')}
                `;
                document.querySelectorAll('.compare-check').forEach(cb => {
                    cb.addEventListener('change', function() {
                        const id = parseInt(this.dataset.id);
                        if (this.checked) { if (!compareList.includes(id)) compareList.push(id); }
                        else { compareList = compareList.filter(i => i !== id); }
                    });
                });
            }

            document.getElementById('compareBtn').addEventListener('click', () => {
                const bookmarks = getBookmarks();
                if (compareList.length < 2 || compareList.length > 6) {
                    alert('Выберите от 2 до 6 моделей для сравнения.');
                    return;
                }
                const selected = compareList.map(i => bookmarks[i]);
                renderCompareModal(selected);
            });

            async function renderCompareModal(models) {
                const modal = document.getElementById('compareModal');
                modal.classList.add('active');
                const table = document.getElementById('compareTable');
                table.innerHTML = '<p>Загрузка сравнения...</p>';
                const summaries = await Promise.all(models.map(m => getLongDescription(m.title).then(d => d.substring(0, 200))));
                let html = '<table class="compare-table"><tr><th>Модель</th>';
                models.forEach(m => html += `<th>${m.title}</th>`);
                html += '</tr><tr><td>Описание</td>';
                summaries.forEach(s => html += `<td>${s}...</td>`);
                html += '</tr></table>';
                table.innerHTML = html;
            }

            function closeCompare() { document.getElementById('compareModal').classList.remove('active'); }

            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('overlay').classList.toggle('active');
                renderSidebar();
            }
            function removeBookmark(url) {
                saveBookmarks(getBookmarks().filter(b => b.url !== url));
                renderSidebar();
            }

            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                if (q.length < 2) { searchDropdown.innerHTML = ''; searchDropdown.classList.remove('active'); return; }
                const results = searchCatalog(q);
                searchDropdown.innerHTML = results.length ? results.map(r => `<div class="search-item" data-url="${r.url}"><strong>${r.title}</strong><div style="font-size:12px;color:var(--text-muted)">${r.category}</div></div>`).join('') : '<div class="search-item">Ничего не найдено</div>';
                searchDropdown.classList.add('active');
                document.querySelectorAll('#searchDropdown .search-item').forEach(el => {
                    el.addEventListener('click', () => { if (el.dataset.url) location.hash = el.dataset.url.substring(1); searchDropdown.classList.remove('active'); searchInput.value = ''; });
                });
            });
            document.addEventListener('click', e => { if (!e.target.closest('.search-container')) searchDropdown.classList.remove('active'); });

            window.addEventListener('hashchange', handleRoute);
            loadCatalog().then(() => { renderSidebar(); });
            return { toggleSidebar, removeBookmark, closeCompare };
        })();
    </script>
</body>
</html>
